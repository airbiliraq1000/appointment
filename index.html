<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Appointment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">
    <h2>Private Appointment</h2>
    <nav class="nav">
        <div class="logo">
            <img src="images/IMAGE 2026-03-26 23:25:28.jpg" alt="Logo">
            <label class="show-card-btn" for="toggleCard">اجتماع عمل</label>
        </div>
    </nav>
   </div> 

     <input type="checkbox" id="toggleCard" hidden>
   <div class="card">
        <label for="appointmentInput">اجتماع عمل</label>

<input
  type="date"
  id="appointmentInput"
  name="trip-start"
  value="2026-07-22"
  min="2026-01-01"
  max="2026-12-31" />
         <button type="button" class="btn" id="confirmBtn">طكه</button>
        <button type="button" class="btn" id="cancelBtn">غيرلي الاجتماع</button>
        <div id="successMessage" class="succsed">اني باجتماع عمل
            <img id="successImage" src="images/IMAGE 2026-03-26 23:15:14.jpg" alt="success">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
